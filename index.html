<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Alley Kats — Home</title>
  <meta http-equiv="Cache-Control" content="no-cache">
  <link rel="stylesheet" href="style.css?v=2">
  <link rel="stylesheet" href="src/styles.css?v=2">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: system-ui, -apple-system, sans-serif;
      background: #080612;
      color: #f0f0f0;
      line-height: 1.6;
    }
    .site-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(15,15,15,0.98);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      z-index: 100;
    }
    .nav {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 1rem 1.5rem;
      margin: 0 auto;
      max-width: 80rem;
    }
    @media (min-width: 1024px) {
      .nav { flex-direction: row; justify-content: center; gap: 2.5rem; padding: 1rem 4rem; }
    }
    .logo { display: block; text-decoration: none; line-height: 0; }
    .logo-img { height: 2.75rem; width: auto; display: block; max-width: 200px; object-fit: contain; }
    .nav-links { list-style: none; margin: 0; padding: 0; display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; }
    .nav-links a { color: #888; text-decoration: none; }
    .nav-links a:hover, .nav-links a.current { color: #c9a227; }
    main {
      flex: 1;
      padding-top: 5.5rem;
      padding-left: 1rem;
      padding-right: 1rem;
      padding-bottom: 4rem;
      background: transparent;
    }
    @media (min-width: 768px) {
      main { padding-top: 6rem; padding-bottom: 6rem; padding-left: 3rem; padding-right: 3rem; }
    }
    .hero-with-band {
      position: relative;
      width: 100%;
      max-width: 720px;
      min-height: 42vh;
      margin: 0 auto;
      overflow: hidden;
      border-radius: 1.5rem;
    }
    .hero-band-photo {
      width: 100%;
      height: 100%;
      min-height: 42vh;
      object-fit: cover;
      display: block;
      border-radius: 1.5rem;
      /* Slight zoom to crop out white border in the image */
      transform: scale(1.08);
      image-rendering: -webkit-optimize-contrast;
      backface-visibility: hidden;
      filter: contrast(1.06) saturate(1.05);
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem 1.5rem;
      background: rgba(0,0,0,0.2);
    }
    .hero-logo-oval-wrap {
      overflow: hidden;
      border-radius: 50%;
      aspect-ratio: 1.35 / 1;
      width: 380px;
      max-width: 90vw;
      flex-shrink: 0;
      display: block;
    }
    .hero-logo-oval-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      transform: scale(2.5);
    }
    .hero-overlay .tagline { margin: 0; color: rgba(255,255,255,0.95); font-size: 1.2rem; text-shadow: 0 1px 3px rgba(0,0,0,0.6); }
    .section { max-width: 700px; margin: 0 auto; padding: 4rem 1.5rem; }
    .intro { text-align: center; }
    .intro p { max-width: 500px; margin: 0 auto 1.5rem; color: #888; }
    .home-links { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; }
    .btn {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: #c9a227;
      color: #0f0f0f;
      text-decoration: none;
      font-weight: 600;
      border-radius: 4px;
    }
    .btn-outline { background: transparent; color: #c9a227; border: 2px solid #c9a227; }
    .site-footer { text-align: center; padding: 2rem 1.5rem; border-top: 1px solid rgba(255,255,255,0.08); color: #888; font-size: 0.9rem; }
    .site-footer p { margin: 0; }
  </style>
</head>
<body>
  <div class="canvas-bg-wrap" aria-hidden="true">
    <canvas id="canvas-bg"></canvas>
  </div>
  <div class="canvas-bg-overlay" aria-hidden="true"></div>
  <div class="site-root">
  <header class="site-header">
    <nav class="nav">
      <ul class="nav-links">
        <li><a href="index.html" class="current">Home</a></li>
        <li><a href="events.html">Upcoming Events</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="store.html">Store</a></li>
        <li><a href="contact.html">Contact Us</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="hero-with-band">
      <img src="images/hero-band-logo.png" alt="The Alley Kats" class="hero-band-photo">
    </section>

    <section class="section intro">
      <p>Welcome to the official home of The Alley Kats. Catch us at a show, browse our gallery, or get in touch for bookings.</p>
      <div class="home-links">
        <a href="events.html" class="btn">Upcoming Events</a>
        <a href="store.html" class="btn btn-outline">Store</a>
        <a href="gallery.html" class="btn btn-outline">View Gallery</a>
        <a href="contact.html" class="btn btn-outline">Contact Us</a>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; <span id="year"></span> The Alley Kats.</p>
  </footer>
  </div>

  <script src="src/main.js?v=3"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
