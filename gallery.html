<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media — The Alley Kats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Righteous&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=7">
</head>
<body class="page-with-canvas-bg">
  <div class="canvas-bg-wrap" style="position:fixed;top:0;left:0;right:0;bottom:0;z-index:0;pointer-events:none;" aria-hidden="true">
    <canvas id="canvas-bg"></canvas>
    <div class="canvas-bg-overlay" aria-hidden="true"></div>
  </div>
  <div class="site-root">
  <header class="site-header">
    <nav class="nav">
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="events.html">Upcoming Events</a></li>
        <li><a href="gallery.html" class="current">Media</a></li>
        <li><a href="store.html">Merch</a></li>
        <li><a href="epk.html">EPK</a></li>
        <li><a href="contact.html">Contact Us</a></li>
      </ul>
    </nav>
  </header>

  <main class="media-page">
    <section class="page-hero page-hero--transparent">
      <h1>Media</h1>
    </section>

    <section class="section media-videos">
      <h2 class="media-block-title">Videos</h2>
      <div class="media-videos-bento">
        <div class="media-video-card media-video-card--featured">
          <div class="gallery-video-wrap gallery-video-wrap--embed">
            <iframe class="gallery-video-embed" src="https://www.youtube.com/embed/4Alh7rx3Uts?rel=0" title="SUNDOWN — Official Music Video" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
          </div>
          <p class="media-video-label">SUNDOWN — Official Music Video</p>
        </div>
        <div class="media-video-card">
          <div class="gallery-video-wrap gallery-video-wrap--embed">
            <iframe class="gallery-video-embed" src="https://www.youtube.com/embed/AMu5PteGURM?rel=0" title="The Alley Kats" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
          </div>
          <p class="media-video-label">The Alley Kats</p>
        </div>
        <div class="media-video-card">
          <div class="gallery-video-wrap gallery-video-wrap--embed">
            <iframe class="gallery-video-embed" src="https://www.youtube.com/embed/9i5_wZfF2TU?rel=0" title="The Alley Kats — Live" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
          </div>
          <p class="media-video-label">The Alley Kats — Live</p>
        </div>
      </div>
    </section>

    <section class="section media-spotify">
      <h2 class="media-block-title">Listen on Spotify</h2>
      <div class="spotify-embed-wrap">
        <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/artist/5zu4Hxw96i76KQ6ffhFaCj?utm_source=generator&theme=0" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy" title="The Alley Kats on Spotify"></iframe>
      </div>
    </section>

    <section class="section media-photos">
      <h2 class="media-block-title">Photos</h2>
      <div class="media-photos-bento">
        <div class="media-photo-item media-photo-item--large">
          <img src="images/austin-solo.png" alt="Austin Taylor on guitar">
        </div>
        <div class="media-photo-item media-photo-item--polaroid">
          <img src="images/austin-portrait.png" alt="Austin Taylor">
        </div>
        <div class="media-photo-item media-photo-item--polaroid">
          <img src="images/band-group.png" alt="The Alley Kats band">
        </div>
        <div class="media-photo-item media-photo-item--polaroid">
          <img src="images/bryce-bass.png" alt="Bryce Taylor on bass">
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; <span id="year"></span> The Alley Kats.</p>
  </footer>
  </div>

  <script src="js/background-effect.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
